<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="980" viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="储能容量配置的作用机理—边际收益递减—拐点决策框架图">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#15803d"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#c2410c"/>
    </marker>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", "SimHei", Arial, sans-serif; font-size: 36px; font-weight: 700; fill: url(#titleGrad); }
      .subtitle { font-family: "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", "SimHei", Arial, sans-serif; font-size: 18px; fill: #475569; }
      .box-title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", "SimHei", Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #0f172a; }
      .box-text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", "SimHei", Arial, sans-serif; font-size: 17px; fill: #334155; }
      .small { font-family: "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", "SimHei", Arial, sans-serif; font-size: 15px; fill: #475569; }
      .caption { font-family: "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", "SimHei", Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
      .pill { font-family: "Microsoft YaHei", "Noto Sans CJK SC", "Source Han Sans SC", "SimHei", Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow-green { stroke: #15803d; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .arrow-orange { stroke: #c2410c; stroke-width: 3; fill: none; marker-end: url(#arrow-orange); }
    </style>
  </defs>
  <rect x="0" y="0" width="1600" height="980" fill="#f8fafc"/>
  <text x="800" y="58" text-anchor="middle" class="title">储能容量配置的作用机理—边际收益递减—拐点决策框架</text>
  <text x="800" y="90" text-anchor="middle" class="subtitle">从源荷错配到离网储能调节，再到 20 / 110–115 / 150 MWh 分层容量决策</text>
  <rect x="55" y="130" width="275" height="250" rx="22" fill="#ecfeff" stroke="#06b6d4" stroke-width="2" filter="url(#softShadow)"/>
  <text x="79" y="168" class="box-title">多场景输入层</text>
  <text x="83" y="202" class="box-text">• 风电场景 W1–W6</text>
  <text x="83" y="232" class="box-text">• 光伏场景 PV1–PV4</text>
  <text x="83" y="262" class="box-text">• 常规电负荷曲线</text>
  <text x="83" y="292" class="box-text">• 制氢 / 制氨装置参数</text>
  <text x="83" y="322" class="box-text">• 储能容量与效率参数</text>
  <text x="83" y="352" class="box-text">• 分时电价与上网电价</text>
  <rect x="390" y="130" width="295" height="250" rx="22" fill="#fff7ed" stroke="#f97316" stroke-width="2" filter="url(#softShadow)"/>
  <text x="414" y="168" class="box-title">源荷错配层</text>
  <text x="418" y="202" class="box-text">• 风光出力具有随机波动</text>
  <text x="418" y="232" class="box-text">• 负荷需求存在时序差异</text>
  <text x="418" y="262" class="box-text">• 富余时段产生弃电</text>
  <text x="418" y="292" class="box-text">• 短缺时段存在供能压力</text>
  <text x="418" y="322" class="box-text">• 制氢氨连续性受到约束</text>
  <text x="418" y="352" class="box-text">• 吨氨成本与产能利用受影响</text>
  <rect x="745" y="130" width="330" height="250" rx="22" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#softShadow)"/>
  <text x="769" y="168" class="box-title">储能时移调节层</text>
  <text x="773" y="202" class="box-text">• 富余电量 → 储能充电</text>
  <text x="773" y="232" class="box-text">• 短缺时段 → 储能放电</text>
  <text x="773" y="262" class="box-text">• 削峰填谷，平滑净负荷</text>
  <text x="773" y="292" class="box-text">• 提高风光消纳比例</text>
  <text x="773" y="322" class="box-text">• 支撑制氢氨负荷连续运行</text>
  <text x="773" y="352" class="box-text">• 降低离网运行波动风险</text>
  <rect x="1135" y="130" width="390" height="250" rx="22" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#softShadow)"/>
  <text x="1159" y="168" class="box-title">技术经济效果层</text>
  <text x="1163" y="202" class="box-text">• 年制氨量提升</text>
  <text x="1163" y="232" class="box-text">• 产能利用率提升</text>
  <text x="1163" y="262" class="box-text">• 弃电量下降</text>
  <text x="1163" y="292" class="box-text">• 缺供电量下降</text>
  <text x="1163" y="322" class="box-text">• 风光利用率提高</text>
  <text x="1163" y="352" class="box-text">• 吨氨成本随容量增加而上升</text>

  <path d="M330 255 C355 255, 365 255, 390 255" class="arrow"/>
  <path d="M685 255 C710 255, 720 255, 745 255" class="arrow"/>
  <path d="M1075 255 C1100 255, 1110 255, 1135 255" class="arrow"/>
  <rect x="250" y="430" width="1100" height="82" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#softShadow)"/>
  <text x="800" y="463" text-anchor="middle" class="caption">储能收益与容量成本之间形成技术经济权衡</text>
  <text x="800" y="493" text-anchor="middle" class="box-text">储能容量增加会带来增产、降弃电和保供收益，但投资成本持续增加，因此需要识别边际收益递减拐点</text>
  <path d="M800 380 C800 405, 800 410, 800 430" class="arrow-green"/>
  <rect x="65" y="575" width="640" height="300" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#softShadow)"/>
  <text x="385" y="615" text-anchor="middle" class="box-title">容量扫描与边际收益递减</text>
  <line x1="130" y1="815" x2="625" y2="815" stroke="#64748b" stroke-width="2"/>
  <line x1="130" y1="815" x2="130" y2="660" stroke="#64748b" stroke-width="2"/>
  <text x="378" y="850" text-anchor="middle" class="small">储能容量 / MWh</text>
  <text x="95" y="735" text-anchor="middle" class="small" transform="rotate(-90 95 735)">综合技术收益</text>
  <path d="M130 800 C170 725, 210 700, 260 680 C330 650, 430 640, 520 638 C565 638, 600 638, 625 638" stroke="#2563eb" stroke-width="5" fill="none"/>
  <circle cx="185" cy="715" r="8" fill="#16a34a"/>
  <circle cx="420" cy="642" r="8" fill="#f97316"/>
  <circle cx="530" cy="638" r="8" fill="#dc2626"/>
  <line x1="185" y1="815" x2="185" y2="715" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,6"/>
  <line x1="420" y1="815" x2="420" y2="642" stroke="#f97316" stroke-width="2" stroke-dasharray="6,6"/>
  <line x1="530" y1="815" x2="530" y2="638" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,6"/>
  <text x="185" y="838" text-anchor="middle" class="small" fill="#16a34a">20</text>
  <text x="420" y="838" text-anchor="middle" class="small" fill="#f97316">110–115</text>
  <text x="530" y="838" text-anchor="middle" class="small" fill="#dc2626">150</text>
  <text x="225" y="765" class="small">快速收益段</text>
  <text x="360" y="685" class="small">拐点区间</text>
  <text x="535" y="675" class="small">饱和段</text>
  <rect x="760" y="575" width="765" height="300" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#softShadow)"/>
  <text x="1142" y="615" text-anchor="middle" class="box-title">拐点识别与分层容量决策</text>
  <rect x="805" y="650" width="200" height="74" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="905" y="680" text-anchor="middle" class="pill" fill="#166534">20 MWh</text>
  <text x="905" y="706" text-anchor="middle" class="small">低投入经济入口容量</text>
  <rect x="1045" y="650" width="230" height="74" rx="18" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
  <text x="1160" y="680" text-anchor="middle" class="pill" fill="#9a3412">110–115 MWh</text>
  <text x="1160" y="706" text-anchor="middle" class="small">技术经济拐点共识区间</text>
  <rect x="1310" y="650" width="175" height="74" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="1397" y="680" text-anchor="middle" class="pill" fill="#991b1b">150 MWh</text>
  <text x="1397" y="706" text-anchor="middle" class="small">技术饱和容量</text>
  <rect x="850" y="755" width="585" height="80" rx="20" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="1142" y="787" text-anchor="middle" class="caption">最终工程推荐：115 MWh</text>
  <text x="1142" y="816" text-anchor="middle" class="box-text">深度消纳型储能容量，用于平衡增产、降弃电与容量冗余</text>
  <path d="M585 512 C500 535, 430 545, 385 575" class="arrow-orange"/>
  <path d="M1015 512 C1085 535, 1125 545, 1142 575" class="arrow-orange"/>
  <rect x="210" y="910" width="1180" height="46" rx="18" fill="#0f172a" opacity="0.92"/>
  <text x="800" y="940" text-anchor="middle" class="box-text" fill="#ffffff">核心结论：储能价值不在于无限增容，而在于通过时移调节缓解源荷错配，并在边际收益递减规律下识别技术经济拐点。</text>
</svg>
